keys:
  # Server age key (from SSH host key after first deploy):
  #   ssh root@<ip> "cat /etc/ssh/ssh_host_ed25519_key.pub" | nix run nixpkgs#ssh-to-age
  - &server REPLACE_WITH_SERVER_AGE_KEY

  # Your personal age key:
  #   age-keygen -o ~/.config/sops/age/keys.txt
  #   age-keygen -y ~/.config/sops/age/keys.txt
  - &admin age13xmjleple4sxkncx7aztuma6740gjyahl92r470n0np7dx4lj3ds08p5el

creation_rules:
  - path_regex: secrets/tbone-web\.yaml$
    key_groups:
      - age:
          - *server
          - *admin
